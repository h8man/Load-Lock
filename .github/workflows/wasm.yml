name: Build & Deploy WASM to Pages

on:
  #push:
  #  branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: emscripten/emsdk:4.0.22

    steps:
        - uses: actions/checkout@v6
    
        - name: Build
          run: make release
          
        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@v5
          with:
            path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
  
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
